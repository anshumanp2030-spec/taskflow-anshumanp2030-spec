version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: taskflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB:       ${DB_NAME:-taskflow}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-taskflow}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: migrate/migrate:v4.17.0
    container_name: taskflow_migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    command: >
      -path=/migrations
      -database=postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-taskflow}?sslmode=disable
      up
    restart: on-failure

  seed:
    image: postgres:16-alpine
    container_name: taskflow_seed
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      PGPASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - ./seed.sql:/seed.sql
    command: >
      psql -h postgres -U ${DB_USER:-postgres} -d ${DB_NAME:-taskflow} -f /seed.sql
    restart: on-failure

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskflow_api
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DB_HOST:     postgres
      DB_PORT:     5432
      DB_USER:     ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME:     ${DB_NAME:-taskflow}
      DB_SSLMODE:  disable
      JWT_SECRET:  ${JWT_SECRET}
      PORT:        ${PORT:-8080}
      ENV:         ${ENV:-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      MIGRATIONS_PATH: migrations
    ports:
      - "${PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
